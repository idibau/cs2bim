### VARIANTE 2.2 ###

# - Raumstruktur: Parzellen 
# - Typisierung: Themen
# - Gruppierung: Themen
# - PSets: Präfix nur CH
# - Bodenbedeckung in 6 Featuretypes

################# general ###################
logging_level: INFO

########### redis configuration #############
redis:
  host: "redis"
  port: 6379
  db:
    celery_broker: "0"
    celery_backend: "1"
    file_cache: "2"
  global_keyprefix: "prefix"

############ i18n configuration #############
i18n:
  de: "/workspace/i18n/de.yml"
  fr: "/workspace/i18n/fr.yml"
  it: "/workspace/i18n/it.yml"

########## postgis configuration ############
db:
  dbname: "cs2bim"
  user: "postgres"
  host: "host.docker.internal"
  port: 5432
  password: "?"

########## stac configuration ############
stac:
  dtm_items_url: "https://data.geo.admin.ch/api/stac/v1/collections/ch.swisstopo.swissalti3d/items"
  building_items_url: "https://data.geo.admin.ch/api/stac/v1/collections/ch.swisstopo.swissbuildings3d_3_0/items"

############# tin configuration #############
tin:
  grid_size: 2.0
  max_height_error: 0.05

############# ifc configuration #############
ifc:
  author: "Geodienste"
  version: "1.0"
  application_name: "cs2bim"
  project_name: "Geobasisdaten"
  geo_referencing: LO_GEO_REF_50
  coordinate_reference_system:
    epsg_code: "EPSG:2056"
    description: "CH1903+ / LV95"
    geodetic_datum: "CH1903+"
    vertical_datum: "LN02"
  projection_feature_types:
    - name: "liegenschaft"
      sql_path: "/workspace/sql/av_liegenschaft.sql"
      entity_mapping:
        entity: IFC_GEOGRAPHIC_ELEMENT
        attributes:
          - attribute: "Name"
            source:
              type: SQL
              expression: "egris_egrid"
          - attribute: "PredefinedType"
            source:
              type: STATIC
              expression: "USERDEFINED"
          - attribute: "ObjectType"
            source:
              type: STATIC
              expression: "AV_LIEGENSCHAFT"
        properties:
          - property: "NBIdent"
            property_set: "CH_AV_Liegenschaft"
            source:
              type: SQL
              expression: "nbident"
          - property: "Nummer"
            property_set: "CH_AV_Liegenschaft"
            source:
              type: SQL
              expression: "nummer"
          - property: "EGRIS_EGRID"
            property_set: "CH_AV_Liegenschaft"
            source:
              type: SQL
              expression: "egris_egrid"
          - property: "Gueltigkeit"
            property_set: "CH_AV_Liegenschaft"
            source:
              type: SQL
              expression: "gueltigkeit"
          - property: "Vollstaendigkeit"
            property_set: "CH_AV_Liegenschaft"
            source:
              type: SQL
              expression: "vollstaendigkeit"
      entity_type_mapping:
        attributes:
          - attribute: "Name"
            source:
              type: STATIC
              expression: "AV_LIEGENSCHAFT"
          - attribute: "PredefinedType"
            source:
              type: STATIC
              expression: "USERDEFINED"
          - attribute: "ElementType"
            source:
              type: STATIC
              expression: "AV_LIEGENSCHAFT"
      spatial_structure_mapping:
        attributes:
          - attribute: "CompositionType"
            source:
              type: STATIC
              expression: "COMPLEX"
          - attribute: "PredefinedType"
            source:
              type: STATIC
              expression: "USERDEFINED"
          - attribute: "ObjectType"
            source:
              type: STATIC
              expression: "Amtliche Vermessung"
          - attribute: "Name"
            source:
              type: STATIC
              expression: "Liegenschaft"
      group_mapping:
        - type: STATIC
          expression: "Amtliche Vermessung.Liegenschaft"
      color:
        r: 0.31
        g: 0.67
        b: 0.04
        a: 0.85
