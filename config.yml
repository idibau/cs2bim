    buildings:
      - name: "all"
        sql_path: "/workspace/sql/egid.sql"
        egid_xpath: ".//gen:intAttribute[@name='EGID']/gen:value"
        entity_mapping:
          entity: IFC_BUILDING
          attributes:
            - attribute: "Name"
              source:
                type: CITY_GML
                expression: ".//gen:intAttribute[@name='EGID']/gen:value"
          properties:
            - property: "Erstellung Jahr"
              property_set: "Erstellung"
              source:
                type: CITY_GML
                expression: ".//gen:intAttribute[@name='ERSTELLUNG_JAHR']/gen:value"
            - property: "Erstellung Monat"
              property_set: "Erstellung"
              source:
                type: CITY_GML
                expression: ".//gen:intAttribute[@name='ERSTELLUNG_MONAT']/gen:value"
          building_parts:
            - entity: IFC_BUILDING_ELEMENT_PROXY
              geometry_mapping:
                xpath: ".//bldg:lod2Solid/gml:Solid[@srsName='EPSG:2056' and @srsDimension='3']"
                geometry: SOLID
              color:
                r: 1.00
                g: 1.00
                b: 1.00
                a: 0.2
            - entity: IFC_WALL
              geometry_mapping:
                xpath: ".//bldg:boundedBy/bldg:WallSurface/bldg:lod2MultiSurface/gml:MultiSurface"
                geometry: MULTI_SURFACE
              color:
                r: 1.00
                g: 1.00
                b: 1.00
                a: 0.00
            - entity: IFC_ROOF
              geometry_mapping:
                xpath: ".//bldg:boundedBy/bldg:RoofSurface/bldg:lod2MultiSurface/gml:MultiSurface"
                geometry: MULTI_SURFACE
              color:
                r: 1.00
                g: 0.8
                b: 0.8
                a: 0.00
            - entity: IFC_SLAB
              geometry_mapping:
                xpath: ".//bldg:boundedBy/bldg:GroundSurface/bldg:lod2MultiSurface/gml:MultiSurface"
                geometry: MULTI_SURFACE
              color:
                r: 0.8
                g: 0.8
                b: 1.00
                a: 0.00
        spatial_structure_mapping:
          attributes:
            - attribute: "CompositionType"
              source:
                type: STATIC
                expression: "COMPLEX"
            - attribute: "PredefinedType"
              source:
                type: STATIC
                expression: "USERDEFINED"
            - attribute: "ObjectType"
              source:
                type: STATIC
                expression: "Liegenschaften"
            - attribute: "Name"
              source:
                type: SQL
                expression: "egris_egrid"
        group_mapping:
          - type: STATIC
            expression: "Amtliche Vermessung.Gebaeude"
  groups:
    - path: "Amtliche Vermessung.Gebaeude"
      entity_mapping:
        entity: IFC_BUILDING_BUILT_SYSTEM
        attributes:
          - attribute: "PredefinedType"
            value: "USERDEFINED"
          - attribute: "ObjectType"
            value: "Gebaeude"