################# general ###################
logging_level: DEBUG

########## postgis configuration ############
db:
  dbname: "cs2bim"
  user: "postgres"
  host: "host.docker.internal"
  port: 5432
  password: "postgres"

########## dtm api configuration ############
dtm:
  stac_api: "https://data.geo.admin.ch/api/stac/v0.9/collections/ch.swisstopo.swissalti3d/items"

############# tin configuration #############
tin:
  grid_size: 0.5
  max_height_error: 0.05

############# ifc configuration #############
ifc:
  author: "FHNW"
  version: "1.0"
  application_name: "cs2bim"
  project_name: "cs2bim"
  geo_referencing: LO_GEO_REF_50
  triangulation_representation_type: TESSELLATION
  feature_classes:
    parcel:
      sql_path: "/workspace/sql/parcels.sql"
      entity_type: IFC_GEOGRAPHIC_ELEMENT
      attributes:
        - name: "PredefinedType"
          column: "predefined_type"
        - name: "ObjectType"
          column: "object_type"
        - name: "Name"
          column: "egris_egrid"
      properties:
        - name: "NBIdent"
          set: "CHKGK_CS"
          column: "nbident"
        - name: "Nummer"
          set: "CHKGK_CS"
          column: "nummer"
        - name: "EGRIS_EGRID"
          set: "CHKGK_CS"
          column: "egris_egrid"
      spatial_structure:
        entity_type: IFC_SITE
        attributes:
          - name: "CompositionType"
            value: "COMPLEX"
          - name: "PredefinedType"
            value: "USERDEFINED"
          - name: "ObjectType"
            value: "Liegenschaften"
          - name: "Name"
            value: "Liegenschaften"
      group_columns:
        - "group"
      color:
        r: 0.31
        g: 0.67
        b: 0.04
        a: 0.85
